<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Womens Day ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e59898;
    font-family: 'Segoe UI', sans-serif;
}

.container {
    position: relative;
}

.envelope {
    position: relative;
    width: 380px;
    height: 260px; /* slightly taller */
    background: #ff4d6d;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    overflow: hidden;
}

/* Flap */
.flap {
    position: absolute;
    top: 0;
    width: 100%;
    height: 130px;
    background: #ff758f;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top;
    transition: transform 0.8s ease;
    z-index: 3;
}

/* Letter */
.letter {
    position: absolute;
    width: 85%;
    max-height: 180px; /* prevents overflow */
    overflow-y: auto; /* scroll if needed */
    background: white;
    border-radius: 12px;
    left: 50%;
    top: 65px;
    transform: translate(-50%, 150%);
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
    transition: transform 0.8s ease;
    z-index: 1;
}

.letter h2 {
    margin: 0 0 10px 0;
    color: #ff4d6d;
    font-size: 20px;
}

.letter p {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
    margin: 0;
}

/* Button */
.open-btn {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 25px;
    border: none;
    background: white;
    color: #ff4d6d;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    z-index: 4;
}

.open-btn:hover {
    background: #ffe5ec;
}

/* OPEN STATE */
.open .flap {
    transform: rotateX(180deg);
}

.open .letter {
    transform: translate(-50%, 0%);
}

.open .open-btn {
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <div class="envelope" id="envelope">
        <div class="flap"></div>

        <div class="letter">
            <h2>Happy Valentine's Day ❤️</h2>
            <p>
                Dearest faggot,<br><br>
                I love you.
                Youre getting piped tonight💕
                Happy womens day
                #rizz
            </p>
        </div>

        <button class="open-btn" onclick="openLetter()">Open</button>
    </div>
</div>

<script>
function openLetter() {
    document.getElementById("envelope").classList.add("open");
}
</script>

</body>
</html>
